appId: com.ytmsynk.app
productName: YTM-Synk
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: bin
    to: bin
    filter:
      - '**/*'
  - from: scripts/download-binaries.js
    to: scripts/download-binaries.js
  - from: resources/icon.png
    to: icon.png
win:
  executableName: YTM-Synk
  icon: build/icon.ico
  target:
    - nsis
nsis:
  artifactName: YTM-Synk-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
# releaseType: draft — electron-builder uploads the installer, blockmap, and
# latest.yml in parallel. If no release exists yet, each upload races to create
# one; losers abort and leave a partial release (assets unreachable by tag URL).
# The release workflow pre-creates an empty draft, then publishes it after upload.
publish:
  provider: github
  owner: webdevs-pro
  repo: ytm-synk
  releaseType: draft
npmRebuild: false
