name: Release

on:
  push:
    branches:
      - release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download binaries
        run: npm run download-binaries

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}"

      - name: Extract changelog notes
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' > "$NOTES_FILE"
          else
            : > "$NOTES_FILE"
          fi
          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "No CHANGELOG.md section for ${VERSION}; falling back to generated notes."
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      # Pre-create an empty draft so parallel electron-builder uploads all target
      # the same release instead of racing to create duplicate ones.
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="${{ steps.changelog.outputs.notes_file }}"
          if [[ -s "$NOTES_FILE" ]]; then
            gh release create "v${VERSION}" \
              --draft \
              --title "${VERSION}" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "v${VERSION}" \
              --draft \
              --title "${VERSION}" \
              --generate-notes
          fi

      - name: Build and publish to GitHub Releases
        run: npm run build:win:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release edit "v${{ steps.version.outputs.version }}" --draft=false
